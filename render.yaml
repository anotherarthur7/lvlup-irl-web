# render.yaml
services:
  - type: web
    name: lvlup-irl-web
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    preDeployCommand: npx prisma migrate deploy  # 👈 КЛЮЧЕВОЕ ДОБАВЛЕНИЕ
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lvlup-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://lvlup-irl-web.onrender.com

databases:
  - name: lvlup-db
    plan: free